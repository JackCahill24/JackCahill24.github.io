# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.

# Theme Settings
remote_theme            : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "contrast" # Excellent, clean look for engineering profiles

# Site Settings
locale                   : "en-US"
direction                : # "ltr" (default), "rtl"
title                    : "John Cahill"
title_separator          : "-"
subtitle                 : "Robotics Master's Student & Mechanical Engineer"
name                     : "John Cahill"
description              : "Digital Engineering Portfolio - Specialized in Autonomous Navigation, Manipulation, and Hardware Integration"
url                      : "https://JackCahill24.github.io"
baseurl                  : ""
repository               : "JackCahill24/JackCahill24.github.io"
teaser                   : # path of fallback teaser image
logo                     : # path of logo image to display in the masthead
masthead_title           : "John Cahill"
breadcrumbs              : false
words_per_minute         : 200
enable_copy_code_button  : true
copyright                : "John Cahill"
copyright_url            : 

comments:
  provider               : false
atom_feed:
  path                   : 
  hide                   : true
search                   : true
search_full_content      : true
search_provider          : lunr
lunr:
  search_within_pages    : true

# SEO Related
google_site_verification :
bing_site_verification   :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
og_image                 : 
og_image_alt             : 
social:
  type                   : Person
  name                   : "John Cahill"
  links:
    - https://www.linkedin.com/in/johncahill4493/
    - https://github.com/JackCahill24

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name                 : "John Cahill"
  avatar               : # We can add a profile photo path later
  bio                  : "Robotics M.S. student at the University of Delaware. Hands-on experience developing autonomous navigation stacks, programming multi-DOF robotic arms, and designing custom mechatronic hardware[cite: 1]."
  location             : "Stony Point, NY"[cite: 1]
  email                : "johncahill4493@gmail.com"[cite: 1]
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      url: "mailto:johncahill4493@gmail.com"[cite: 1]
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/johncahill4493/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/JackCahill24"

# Site Footer
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/johncahill4493/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/JackCahill24"
  since: "2026"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs 
  - /test 
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed 
  quiet_deps: true
  silence_deprecations: ['import']

# Outputting
permalink: /:categories/:title/
timezone: # e.g. America/New_York

# Pagination with jekyll-paginate
paginate: 5 
paginate_path: /page:num/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
